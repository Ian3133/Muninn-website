type UserState
  @model
  @auth(rules: [
    { allow: owner },
    { allow: private, provider: iam },
    { allow: public, provider: apiKey }
  ]) {
  id: ID!
  noteText: String
  flag: Boolean
  newsletterComment: String
  checkbox1: Boolean
  checkbox2: Boolean
  checkbox3: Boolean
  selectedState: String
  updatedAt: AWSDateTime
}
